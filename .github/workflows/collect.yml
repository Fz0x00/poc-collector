name: Collect PoC/Exploit Data

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      max_cves:
        description: 'Max CVEs to process (0=all)'
        required: false
        default: '0'
      model:
        description: 'LLM model'
        required: false
        default: 'gpt-4o-mini'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download chromium-cves.json from intel repo
        run: |
          curl -sL "https://raw.githubusercontent.com/Fz0x00/chromium-intel/main/data/chromium-cves.json" \
            -o data/chromium-cves.json
          echo "CVEs downloaded: $(python3 -c "import json; print(len(json.load(open('data/chromium-cves.json'))))")"

      - name: Run collection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HTTPS_PROXY: ${{ secrets.PROXY_URL }}
        run: |
          python3 scripts/collect.py \
            --output data/poc-results.json \
            --cache-dir data/cache \
            --max-cves "${{ github.event.inputs.max_cves || '0' }}" \
            --model "${{ github.event.inputs.model || 'gpt-4o-mini' }}"

      - name: Generate report
        run: python3 scripts/report.py

      - name: Commit results
        run: |
          git config user.name "poc-collector-bot"
          git config user.email "bot@poc-collector"
          git add data/poc-results.json data/poc-report.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update PoC results $(date -u +%Y-%m-%d)"
            git push
          fi
